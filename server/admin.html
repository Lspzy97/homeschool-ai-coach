<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家校AI助手 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0E27 0%, #1A1F4E 100%);
      min-height: 100vh;
      color: #fff;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-box h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .login-box p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      text-align: left;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
    }
    .input-group input:focus {
      outline: none;
      border-color: #667EEA;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }

    /* Dashboard */
    .dashboard { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 { font-size: 24px; }
    .logout-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      cursor: pointer;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .stat-card .num { font-size: 36px; font-weight: bold; }
    .stat-card .label { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 5px; }
    .stat-card.vip .num { color: #FFD700; }
    .user-list {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .user-list-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 150px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      gap: 10px;
    }
    .user-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 150px;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      align-items: center;
      gap: 10px;
    }
    .user-item:hover { background: rgba(255,255,255,0.02); }
    .openid { font-size: 12px; color: rgba(255,255,255,0.5); word-break: break-all; }
    .status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status.free { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .status.vip { background: #FFD700; color: #000; }
    .status.expired { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .expire-date { font-size: 12px; color: rgba(255,255,255,0.5); }
    .action-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .action-btn.open {
      background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
      color: #fff;
    }
    .action-btn.vip {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      cursor: not-allowed;
    }
    .action-btn.loading {
      opacity: 0.6;
      cursor: wait;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #07C160;
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #ff6b6b; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <h1>🏠 家校AI助手</h1>
      <p>管理后台</p>
      <div class="input-group">
        <label>管理密钥</label>
        <input type="password" id="password" placeholder="请输入管理密钥">
      </div>
      <button class="login-btn" onclick="doLogin()">登录</button>
      <p class="login-error" id="loginError">密钥错误</p>
    </div>
  </div>

  <!-- 管理后台 -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>🏠 家校AI助手 - 管理后台</h1>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalUsers">0</div>
        <div class="label">总用户数</div>
      </div>
      <div class="stat-card vip">
        <div class="num" id="vipUsers">0</div>
        <div class="label">VIP会员</div>
      </div>
      <div class="stat-card">
        <div class="num" id="freeUsers">0</div>
        <div class="label">免费用户</div>
      </div>
    </div>

    <div class="user-list">
      <div class="user-list-header">
        <div>用户ID</div>
        <div>会员状态</div>
        <div>到期时间</div>
        <div>注册时间</div>
        <div>操作</div>
      </div>
      <div id="userListBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = prompt('请输入服务器地址:', 'http://127.0.0.1:3000') || 'http://127.0.0.1:3000';
    const ADMIN_KEY = 'lzmzzy2026';
    let token = localStorage.getItem('adminToken');

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '') + ' show';
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function doLogin() {
      const pwd = document.getElementById('password').value;
      if (pwd === ADMIN_KEY) {
        token = ADMIN_KEY;
        localStorage.setItem('adminToken', token);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadUsers();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      location.reload();
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/api/member/admin/list?key=${ADMIN_KEY}`);
        const data = await res.json();
        if (data.success) {
          renderStats(data.data);
          renderUserList(data.data);
        }
      } catch (e) {
        showToast('加载失败: ' + e.message, true);
      }
    }

    function renderStats(users) {
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('vipUsers').textContent = users.filter(u => u.isVip).length;
      document.getElementById('freeUsers').textContent = users.length - users.filter(u => u.isVip).length;
    }

    function renderUserList(users) {
      const body = document.getElementById('userListBody');
      if (users.length === 0) {
        body.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.5)">暂无用户</div>';
        return;
      }
      body.innerHTML = users.map(u => {
        const isVip = u.isVip;
        const expireDate = u.expireDate ? new Date(u.expireDate).toLocaleDateString() : '-';
        const createdAt = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '-';
        const btnClass = isVip ? 'vip' : 'open';
        const btnText = isVip ? '已是VIP' : '开通会员';
        const btnDisabled = isVip ? 'disabled' : '';
        return `
          <div class="user-item">
            <div class="openid">${u.openid}</div>
            <div><span class="status ${isVip ? 'vip' : 'free'}">${isVip ? 'VIP' : '免费'}</span></div>
            <div class="expire-date">${expireDate}</div>
            <div class="expire-date">${createdAt}</div>
            <div>
              <button class="action-btn ${btnClass}" ${btnDisabled}
                onclick="${isVip ? '' : `openVip('${u.openid}')`}">${btnText}</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function openVip(openid) {
      if (!confirm('确认开通该用户会员？')) return;
      try {
        const res = await fetch(`${API_URL}/api/member/upgrade`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ openid, vipLevel: 'monthly' })
        });
        const data = await res.json();
        if (data.success) {
          showToast('开通成功！');
          loadUsers();
        } else {
          showToast('开通失败: ' + data.error, true);
        }
      } catch (e) {
        showToast('开通失败: ' + e.message, true);
      }
    }

    // 自动登录
    if (token === ADMIN_KEY) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadUsers();
    }
  </script>
</body>
</html>
